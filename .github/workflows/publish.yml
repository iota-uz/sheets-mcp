name: publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; node 20 ships older.
      - run: npm install -g npm@latest

      - run: npm ci

      # Prerelease versions (e.g. 0.1.0-rc.1) can't go to the `latest` dist-tag,
      # so route them to `rc`; stable versions publish to `latest`.
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            npm publish --access public --tag rc
          else
            npm publish --access public
          fi
